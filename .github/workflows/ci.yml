name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev pkg-config zlib1g-dev

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Run checks and generate coverage badge
        run: |
          uv run ruff check .
          uv run ty check python tests tools
          uv run pytest --cov-report=json:coverage.json
          uv run python -m tools.coverage_badge \
            --coverage-json coverage.json \
            --output badges/coverage.svg

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.json
            badges/coverage.svg
          if-no-files-found: error

      - name: Commit updated coverage badge
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- badges/coverage.svg; then
            echo "Coverage badge is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git commit -m "chore: update coverage badge [skip ci]"
          git push
