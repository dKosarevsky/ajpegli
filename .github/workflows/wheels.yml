name: Wheels

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/wheels.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "src/**"
      - "python/**"
      - "tests/**"
      - "third_party/jpegli.commit"
      - "third_party/jpegli/**"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built distributions after the build"
        type: choice
        default: "none"
        options:
          - "none"
          - "testpypi"
          - "pypi"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  wheel-smoke:
    name: Build wheel smoke (manylinux x86_64)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS: x86_64

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheels-manylinux-x86_64
          path: wheelhouse/*.whl
          if-no-files-found: error

  wheels:
    name: Build wheels (${{ matrix.label }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: manylinux x86_64
            os: ubuntu-latest
            cibw_archs: x86_64
          - label: manylinux aarch64
            os: ubuntu-24.04-arm
            cibw_archs: aarch64
          - label: macOS x86_64
            os: macos-15-intel
            cibw_archs: x86_64
          - label: macOS arm64
            os: macos-14
            cibw_archs: arm64
          - label: Windows x64
            os: windows-latest
            cibw_archs: AMD64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.label }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs:
      - sdist
      - wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'testpypi'
    environment: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs:
      - sdist
      - wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'pypi')
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  pypi-sdist-install-smoke:
    name: PyPI sdist install smoke
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'pypi')

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev pkg-config zlib1g-dev

      - name: Resolve published version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])
          PY
          )"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install published sdist
        run: |
          python -m venv /tmp/ajpegli-sdist-smoke
          source /tmp/ajpegli-sdist-smoke/bin/activate
          python -m pip install --upgrade pip

          for attempt in {1..12}; do
            if python -m pip install --no-cache-dir --no-binary ajpegli "ajpegli==${{ steps.version.outputs.version }}"; then
              exit 0
            fi
            echo "Published sdist is not installable yet; retry ${attempt}/12."
            sleep 10
          done

          python -m pip install --no-cache-dir --no-binary ajpegli "ajpegli==${{ steps.version.outputs.version }}"

      - name: Smoke installed package
        env:
          AJPEGLI_VERSION: ${{ steps.version.outputs.version }}
        run: |
          source /tmp/ajpegli-sdist-smoke/bin/activate
          cd /tmp
          python - <<'PY'
          import os
          from pathlib import Path

          import ajpegli
          import numpy as np

          image = (
              Path(os.environ["GITHUB_WORKSPACE"])
              / "third_party"
              / "jpegli"
              / "testdata"
              / "jxl"
              / "jpeg_reconstruction"
              / "1x1_exif_xmp.jpg"
          )
          decoded = ajpegli.imread(image)
          decoded_from_memory = ajpegli.imdecode(image.read_bytes())

          assert ajpegli.__version__ == os.environ["AJPEGLI_VERSION"]
          assert decoded.shape == (1, 1, 3)
          assert decoded.dtype == np.dtype("uint8")
          assert decoded_from_memory.shape == decoded.shape
          assert decoded_from_memory.dtype == decoded.dtype
          print(f"ajpegli {ajpegli.__version__}")
          PY
