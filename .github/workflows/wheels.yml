name: Wheels

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/wheels.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "src/**"
      - "python/**"
      - "tests/**"
      - "third_party/jpegli.commit"
      - "third_party/jpegli/**"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built distributions after the build"
        type: choice
        default: "none"
        options:
          - "none"
          - "testpypi"
          - "pypi"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  wheels:
    name: Build wheels (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: manylinux x86_64
            os: ubuntu-latest
            cibw_archs: x86_64
          - label: manylinux aarch64
            os: ubuntu-24.04-arm
            cibw_archs: aarch64
          - label: macOS x86_64
            os: macos-15-intel
            cibw_archs: x86_64
          - label: macOS arm64
            os: macos-14
            cibw_archs: arm64
          - label: Windows x64
            os: windows-latest
            cibw_archs: AMD64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.label }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs:
      - sdist
      - wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'testpypi'
    environment: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs:
      - sdist
      - wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'pypi')
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
